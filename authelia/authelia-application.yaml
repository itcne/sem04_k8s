---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authelia
  namespace: argocd
spec:
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
  project: default
  sources:
    - repoURL: 'https://github.com/Cloud-native-engineering/sem04_k8s.git'
      path: 'authelia'
      targetRevision: main
      ref: values
    - chart: authelia
      repoURL: https://charts.authelia.com
      targetRevision: 0.11.4
      helm:
        valueFiles:
          - $values/authelia/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: authelia
