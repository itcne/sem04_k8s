---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
  project: default
  sources:
    - repoURL: 'https://github.com/Cloud-native-engineering/sem04_k8s.git'
      path: 'traefik'
      targetRevision: main
      ref: values
    - chart: traefik
      repoURL: https://traefik.github.io/charts
      targetRevision: 40.0.0
      helm:
        valueFiles:
          - $values/traefik/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
