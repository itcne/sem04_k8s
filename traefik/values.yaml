---
deployment:
  kind: Deployment
  replicas: 1

providers:
  kubernetesIngress:
    enabled: true
    ingressClass: traefik
  kubernetesCRD:
    enabled: true

ingressClass:
  enabled: true
  isDefaultClass: false
  name: traefik

ports:
  web:
    exposedPort: 80
  websecure:
    exposedPort: 443

service:
  type: LoadBalancer
  labels:
    arpAdvertise: "true"

api:
  dashboard: true
